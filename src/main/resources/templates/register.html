<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Регистрация</title>
</head>
<body>
<h2>Регистрация</h2>

<div th:if="${error}" th:text="${error}" style="color:red"></div>

<form th:action="@{/register}" th:object="${registrationDTO}" method="post">
    <label>Email:</label><br>
    <input type="email" th:field="*{email}" required/><br>
    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red"></span><br>

    <label>Пароль:</label><br>
    <input type="password" th:field="*{password}" required/><br>
    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red"></span><br>

    <label>Имя:</label><br>
    <input type="text" th:field="*{name}" required/><br>
    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red"></span><br>

    <label>Дата рождения:</label><br>
    <input type="date" th:field="*{birthDate}"/><br>

    <button type="submit">Зарегистрироваться</button>
</form>

<a th:href="@{/login}">Уже есть аккаунт? Войти</a>
</body>
</html>
